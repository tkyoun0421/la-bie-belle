name: 버그 리포트
description: 재현 가능한 문제나 회귀를 보고합니다.
title: "[Bug] "
labels:
  - bug
  - needs-triage
body:
  - type: textarea
    id: problem
    attributes:
      label: 문제 설명
      description: 무엇이 잘못됐는지 설명해주세요.
      placeholder: 예) 대시보드에서 REWORK 필터를 누르면 상세 패널이 이전 이슈를 계속 표시합니다.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      description: 원래 어떻게 동작해야 하나요?
      placeholder: 예) 필터 후 첫 번째 REWORK 이슈의 상세가 표시되어야 합니다.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 재현 방법
      description: 문제를 재현하는 단계를 적어주세요.
      placeholder: |
        1. 대시보드를 연다.
        2. PASS 이슈를 선택한다.
        3. REWORK 필터를 누른다.
    validations:
      required: true

  - type: textarea
    id: verification_method
    attributes:
      label: 검증 방법
      description: 수정 후 어떤 방식으로 고쳐졌는지 확인할 수 있나요?
      placeholder: 예) 필터 변경 후 상세 패널이 현재 목록의 첫 번째 항목으로 갱신되는지 확인
    validations:
      required: true

  - type: checkboxes
    id: ai_harness_candidate
    attributes:
      label: AI 하네스 처리 여부
      options:
        - label: AI 하네스로 처리해도 좋은 이슈입니다.
          required: false

  - type: checkboxes
    id: ai_impact
    attributes:
      label: AI-impact 여부
      description: 이 변경이 AI의 입력, 판단, 출력, 평가, 권한, 안전 경계에 영향을 주면 체크하세요.
      options:
        - label: AI-impact 변경입니다.
          required: false

  - type: textarea
    id: context
    attributes:
      label: 추가 맥락
      description: 환경, 로그, 스크린샷, 관련 파일이 있으면 적어주세요.
    validations:
      required: false
