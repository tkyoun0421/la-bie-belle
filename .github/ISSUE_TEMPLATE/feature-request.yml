name: 기능 요청
description: 새 기능이나 개선 아이디어를 제안합니다.
title: "[Feature] "
labels:
  - enhancement
  - needs-triage
body:
  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 어떤 결과를 만들고 싶은지 설명해주세요.
      placeholder: 예) 하네스 대시보드에서 하네스 개선 제안을 승인/기각 상태로 볼 수 있게 한다.
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: 기대 효과
      description: 이 기능이 어떤 문제를 줄이거나 어떤 판단을 쉽게 하나요?
      placeholder: 예) 반복되는 개선 제안을 사람이 더 빠르게 판단할 수 있습니다.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 포함 범위
      description: 이번 요청에 포함되면 좋을 작업을 적어주세요.
      placeholder: |
        - 개선 제안 목록 표시
        - 상태별 필터
    validations:
      required: false

  - type: textarea
    id: verification_method
    attributes:
      label: 검증 방법
      description: 기능이 완료됐는지 어떻게 확인하면 좋을까요?
      placeholder: 예) 샘플 개선 제안 데이터가 상태별로 필터링되는지 확인
    validations:
      required: true

  - type: checkboxes
    id: ai_harness_candidate
    attributes:
      label: AI 하네스 처리 여부
      options:
        - label: AI 하네스로 처리해도 좋은 이슈입니다.
          required: false

  - type: checkboxes
    id: ai_impact
    attributes:
      label: AI-impact 여부
      description: 이 변경이 AI의 입력, 판단, 출력, 평가, 권한, 안전 경계에 영향을 주면 체크하세요.
      options:
        - label: AI-impact 변경입니다.
          required: false

  - type: textarea
    id: context
    attributes:
      label: 추가 맥락
      description: 참고할 예시, 스크린샷, 관련 이슈가 있으면 적어주세요.
    validations:
      required: false
