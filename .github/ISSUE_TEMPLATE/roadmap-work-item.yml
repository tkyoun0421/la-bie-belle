name: 로드맵 작업 티켓
description: 마일스톤 기반 로드맵 티켓 생성
title: ""
labels:
  - track:roadmap
  - kind:feature
body:
  - type: markdown
    attributes:
      value: |
        이 티켓은 "작업 요청"이 아니라 "구현 명세"에 가깝게 작성한다.

        아래 항목을 다 채우면, 리뷰어와 작업자가 이 티켓만 보고도 다음을 이해할 수 있어야 한다.
        - 왜 이 작업을 지금 해야 하는지
        - 무엇을 만들고 무엇을 만들지 않는지
        - 어떤 화면, 데이터, 권한, 테스트가 영향을 받는지
        - 이 티켓이 닫히면 무엇이 데모 가능해지는지
  - type: textarea
    id: background
    attributes:
      label: 배경 / 문제
      description: 지금 어떤 문제나 공백이 있어서 이 티켓이 필요한가요?
      placeholder: |
        현재 상태:
        - 사용자는 ...
        - 운영자는 ...

        문제:
        - 아직 ...
        - 그래서 ...
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 이 티켓이 완료되면 사용자가 무엇을 할 수 있어야 하나요?
      placeholder: |
        이 티켓이 끝나면 ...
        - 매니저가 ...
        - 멤버가 ...
    validations:
      required: true
  - type: textarea
    id: user-value
    attributes:
      label: 사용자 가치
      description: 이 작업이 현재 릴리즈에서 왜 중요한지 적어주세요.
      placeholder: |
        - 사용자 관점:
        - 운영 관점:
        - 지금 이 순서로 해야 하는 이유:
    validations:
      required: true
  - type: textarea
    id: user-flow
    attributes:
      label: 기대 사용자 흐름
      description: 이 티켓이 닫히면 어떤 흐름이 happy path로 이어져야 하나요?
      placeholder: |
        1. 사용자가 ...
        2. 화면에서 ...
        3. 서버에서 ...
        4. 다시 화면에 ...
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 포함 범위
      description: 실제로 건드릴 구현 범위를 구체적으로 적어주세요.
      placeholder: |
        - route / screen:
        - query:
        - mutation / action:
        - schema / rule:
        - UI surface:
        - analytics / audit / notification:
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: 제외 범위
      description: 이번 티켓에서 의도적으로 하지 않을 것을 적어주세요.
      placeholder: |
        - 이번 티켓에서는 ... 하지 않음
        - 다음 slice 또는 다음 phase로 넘김
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 영향 받는 영역
      description: 리뷰어가 어디를 중심으로 보면 되는지 적어주세요.
      placeholder: |
        - 대상 역할:
        - 영향 화면:
        - 영향 데이터:
        - 권한 / 접근 제어:
        - 외부 의존성:
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 완료 조건
      description: 무엇이 충족되어야 이 티켓을 닫을 수 있나요?
      placeholder: |
        - happy path가 동작한다
        - 핵심 예외가 막힌다
        - PR에 테스트 근거가 연결된다
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: 테스트 계획
      description: TDD 기준으로 어떤 테스트를 먼저 만들고 어디까지 검증할지 적어주세요.
      placeholder: |
        먼저 만들 실패 테스트:
        - unit:
        - integration:

        green 확인:
        - happy path:
        - 핵심 예외:

        필요 시 e2e:
        - e2e:
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: 리스크 / 오픈 질문
      description: 구현 전에 확인이 필요한 부분이나 깨질 수 있는 지점을 적어주세요.
      placeholder: |
        - 리스크:
        - 확인 필요:
        - 결정 필요:
        - 의존 작업:
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: 근거 문서
      description: 이 티켓이 따르는 계획 문서를 적어주세요.
      placeholder: |
        - docs/plans/build-plan.md
        - docs/plans/execution-plan.md
        - docs/plans/phases/...
    validations:
      required: true
