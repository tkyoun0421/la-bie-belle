name: 로드맵 작업 티켓
description: 마일스톤 기반 로드맵 티켓 생성
title: ""
labels:
  - track:roadmap
  - kind:feature
body:
  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 이 티켓이 완료되면 사용자가 무엇을 할 수 있어야 하나요?
      placeholder: 매니저가 ...
    validations:
      required: true
  - type: textarea
    id: user-value
    attributes:
      label: 사용자 가치
      description: 이 작업이 현재 릴리즈에서 왜 중요한지 적어주세요.
      placeholder: 이 작업이 중요한 이유는 ...
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 범위
      description: 실제로 건드릴 구현 범위를 적어주세요.
      placeholder: |
        - route 또는 flow
        - query 또는 mutation
        - schema 또는 rule
        - UI surface
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 완료 조건
      description: 무엇이 충족되어야 이 티켓을 닫을 수 있나요?
      placeholder: |
        - happy path가 동작한다
        - 핵심 예외가 막힌다
        - PR에 테스트 근거가 연결된다
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: 테스트 계획
      description: TDD 기준으로 어떤 테스트를 먼저 만들고 어디까지 검증할지 적어주세요.
      placeholder: |
        - unit:
        - integration:
        - e2e:
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: 근거 문서
      description: 이 티켓이 따르는 계획 문서를 적어주세요.
      placeholder: |
        - docs/plans/build-plan.md
        - docs/plans/execution-plan.md
