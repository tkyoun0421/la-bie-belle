version: 1
name: issue_execution
total_points: 100
decision_thresholds:
  pass:
    min: 80
    max: 100
  rework:
    min: 65
    max: 79
  fail:
    min: 0
    max: 64

inputs:
  - original_github_issue
  - task-spec.md
  - plan.md
  - spec.md
  - implementation-notes.md
  - git_diff
  - verification.md
  - test_lint_build_log_summary

scoring_rules:
  - 상위 카테고리 점수는 하위 항목 점수 합계로 산출한다.
  - 하위 항목의 max_score 합계는 상위 카테고리 max_score와 같아야 한다.
  - 각 하위 항목은 full, partial, minimal, zero 품질 기준을 가진다.
  - 감점이 있으면 deductions에 사유를 기록하고, 후속 개선으로 이어질 수 있으면 follow_up을 함께 기록한다.
  - PASS/REWORK/FAIL 경계는 total_score만으로 결정한다.

quality_scale:
  full: 해당 하위 항목의 의도를 근거와 함께 온전히 충족하면 만점을 준다.
  partial: 핵심은 충족했지만 근거, 완성도, 엣지 처리 중 일부가 부족하면 약 70% 점수를 준다.
  minimal: 흔적은 있으나 실행 결과를 신뢰하기 어렵거나 중요한 부분이 빠졌으면 약 40% 점수를 준다.
  zero: 항목을 수행하지 않았거나 반대 증거가 있으면 0점을 준다.

categories:
  - id: result_quality
    label: 결과물 품질
    points: 70
    criteria:
      - id: requirement_fulfillment
        label: 요구사항 충족도
        points: 25
        subcriteria:
          - id: explicit_requirements
            label: 명시 요구사항 반영
            points: 10
          - id: acceptance_criteria
            label: 완료 기준 충족
            points: 7
          - id: user_intent_priority
            label: 사용자 의도와 우선순위 반영
            points: 5
          - id: no_missing_or_regression
            label: 누락/회귀 없음
            points: 3
      - id: scope_control
        label: 범위 준수
        points: 15
        subcriteria:
          - id: requested_scope_only
            label: 요청 범위 안에서 해결
            points: 7
          - id: minimal_unrelated_changes
            label: 불필요한 변경 최소화
            points: 4
          - id: out_of_scope_respected
            label: 제외 범위 준수
            points: 4
      - id: implementation_quality
        label: 구현 품질
        points: 15
        subcriteria:
          - id: existing_patterns
            label: 기존 패턴과 구조 활용
            points: 5
          - id: maintainable_code
            label: 단순하고 유지보수 가능한 코드
            points: 5
          - id: boundaries_and_errors
            label: 오류 처리와 경계 조건 고려
            points: 3
          - id: low_duplication
            label: 중복/임시방편 최소화
            points: 2
      - id: verification_sufficiency
        label: 검증 충분성
        points: 10
        subcriteria:
          - id: automated_checks
            label: 자동 검증 실행
            points: 4
          - id: requirement_traceability
            label: 요구사항별 검증 연결
            points: 3
          - id: residual_risk_recorded
            label: 실패/잔여 리스크 기록
            points: 2
          - id: manual_check_judgement
            label: 수동 확인 필요성 판단
            points: 1
      - id: risk_and_safety
        label: 리스크와 안전성
        points: 5
        subcriteria:
          - id: data_state_permission_safety
            label: 데이터/상태/권한 위험 회피
            points: 2
          - id: user_flow_preserved
            label: 기존 사용자 흐름 보호
            points: 2
          - id: destructive_actions_avoided
            label: 파괴적 작업 회피
            points: 1

  - id: process_quality
    label: 작업 과정 품질
    points: 30
    criteria:
      - id: requirement_interpretation
        label: 요구사항 해석 품질
        points: 10
        subcriteria:
          - id: issue_and_comments_reflected
            label: 이슈 본문과 댓글 반영
            points: 4
          - id: undecided_items_identified
            label: 미확정 결정 식별
            points: 3
          - id: confirmed_decisions_only
            label: 확정된 결정만 구현에 반영
            points: 3
      - id: plan_appropriateness
        label: 계획 적절성
        points: 8
        subcriteria:
          - id: execution_order
            label: 작업 순서 적절성
            points: 3
          - id: verification_strategy
            label: 검증 전략 포함
            points: 3
          - id: risks_and_non_goals
            label: 리스크와 제외 범위 명시
            points: 2
      - id: context_usage
        label: 컨텍스트 활용
        points: 6
        subcriteria:
          - id: relevant_files_checked
            label: 관련 파일과 기존 패턴 확인
            points: 3
          - id: prior_runs_and_rules
            label: 이전 run/하네스 규칙 반영
            points: 2
          - id: latest_remote_issue_state
            label: 최신 원격/이슈 상태 확인
            points: 1
      - id: handoff_quality
        label: 기록과 인수인계 품질
        points: 6
        subcriteria:
          - id: artifact_completeness
            label: 산출물 완성도
            points: 2
          - id: change_reason_and_result
            label: 변경 이유와 결과 기록
            points: 2
          - id: next_work_from_deductions
            label: 다음 작업/감점 사유 연결
            points: 2
